AWSTemplateFormatVersion: "2010-09-09"
Description: "Automated Cloud Blueprint for Jericho Portfolio Chatbot Infrastructure"

Resources:
  # ==========================================
  # 1. SECURITY & ACCESSIBILITY PERMISSIONS
  # ==========================================
  LexBotExecutionRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lexv2.amazonaws.com
            Action: "sts:AssumeRole"
      ManagedPolicyArns:
        - "arn:aws:iam::aws:policy/AmazonLexFullAccess"

  # ==========================================
  # 2. AMAZON LEX BOT CONTEXT & GLOBAL DATA
  # ==========================================
  PortfolioAssistantBot:
    Type: "AWS::Lex::Bot"
    Properties:
      Name: "PortfolioAssistant_IaC"
      DataPrivacy:
        ChildDirected: false
      IdleSessionTTLInSeconds: 300
      RoleArn: !GetAtt LexBotExecutionRole.Arn
      TestBotAliasSettings:
        SentimentAnalysisSettings:
          ObjectNotificationReady: false
      BotLocales:
        - LocaleId: "en_US"
          NluIntentConfidenceThreshold: 0.40
          Description: "English locale mapping for portfolio NLU system"

          # ==========================================
          # 3. CONVERSATIONAL BOT INTENTS
          # ==========================================
          Intents:
            # --- FALLBACK ENGINE ---
            - Name: "FallbackIntent"
              Description: "Default intent triggered when user input cannot be classified."
              ParentIntentSignature: "AMAZON.FallbackIntent"
              IntentClosingSetting:
                ClosingResponse:
                  MessageGroupsList:
                    - Message:
                        PlainTextMessage:
                          Value: "I didn't quite catch that. I am Jericho's Portfolio Assistant, and I am trained to help you with specific inquiries. You can ask me about his tech stack, view his notable works, request his general contact info, or type 'schedule a meeting' to book an interview!"
                NextStep:
                  DialogAction:
                    Type: "CloseIntent"

            # --- INTENT: SKILLS & TECH STACK ---
            - Name: "AskTechStack"
              Description: "Answers inquiries regarding software languages and stack proficiencies."
              SampleUtterances:
                - Utterance: "What is your tech stack?"
                - Utterance: "What programming languages do you know?"
                - Utterance: "What technologies do you use?"
              IntentClosingSetting:
                ClosingResponse:
                  MessageGroupsList:
                    - Message:
                        PlainTextMessage:
                          Value: "I specialize in a modern full-stack ecosystem including Next.js, React, Tailwind CSS, TypeScript, Supabase, and AWS Serverless infrastructure. I also utilize Blender for 3D modeling and animation."
                NextStep:
                  DialogAction:
                    Type: "CloseIntent"

            # --- INTENT: PORTFOLIO WORKS ---
            - Name: "AskWorks"
              Description: "Outputs references to engineered system solutions."
              SampleUtterances:
                - Utterance: "What projects have you built?"
                - Utterance: "Show me your work"
                - Utterance: "What are your notable works?"
              IntentClosingSetting:
                ClosingResponse:
                  MessageGroupsList:
                    - Message:
                        PlainTextMessage:
                          Value: "Some of my notable projects include Horizon AI (a multi-agent orchestration framework), Dentara (a healthtech PWA), a rapid Next.js + Supabase QR Code attendance tracker, and custom 3D web assets engineered in Blender."
                NextStep:
                  DialogAction:
                    Type: "CloseIntent"

            # --- INTENT: PERSONAL CHANNELS & CONTACTS ---
            - Name: "AskContact"
              Description: "Displays links, profiles, and active direct communication lines."
              SampleUtterances:
                - Utterance: "How can I contact you?"
                - Utterance: "What is your email address?"
                - Utterance: "How can I get in touch?"
              IntentClosingSetting:
                ClosingResponse:
                  MessageGroupsList:
                    - Message:
                        PlainTextMessage:
                          Value: "You can email me directly at vardejericho@gmail.com, use the contact form on this page to trigger an instant inquiry, or find me on GitHub under my organization name, Sinkronizze."
                NextStep:
                  DialogAction:
                    Type: "CloseIntent"

            # --- INTENT: BIO & GENERAL IDENTITY ---
            - Name: "AskGeneralInfo"
              Description: "Replies with baseline biographical and location profiles."
              SampleUtterances:
                - Utterance: "What is your full name?"
                - Utterance: "Who are you?"
                - Utterance: "Tell me about Jericho"
                - Utterance: "Where do you study?"
              IntentClosingSetting:
                ClosingResponse:
                  MessageGroupsList:
                    - Message:
                        PlainTextMessage:
                          Value: "My full name is Jericho F. Varde. I am a third-year Computer Science student at Pamantasan ng Cabuyao, working toward becoming a Cloud Engineer. You can reach me directly via email at vardejericho@gmail.com or explore my GitHub organization, Sinkronizze!"
                NextStep:
                  DialogAction:
                    Type: "CloseIntent"

            # --- INTENT: INTERVIEW BOOKING PIPELINE ---
            - Name: "BookMeeting"
              Description: "Interactive scheduling pipeline utilizing contextual date/time extractions."
              SampleUtterances:
                - Utterance: "I want to schedule a meeting with Jericho"
                - Utterance: "Can we set up a call?"
                - Utterance: "Book an appointment"
                - Utterance: "Are you available for an interview?"
              Slots:
                - Name: "AppointmentDate"
                  SlotTypeName: "AMAZON.Date"
                  ValueElicitationSetting:
                    SlotConstraint: "Required"
                    PromptSpecification:
                      MaxRetries: 3
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "What day would you like to schedule the meeting?"
                - Name: "AppointmentTime"
                  SlotTypeName: "AMAZON.Time"
                  ValueElicitationSetting:
                    SlotConstraint: "Required"
                    PromptSpecification:
                      MaxRetries: 3
                      MessageGroupsList:
                        - Message:
                            PlainTextMessage:
                              Value: "What time works best for you?"
              IntentClosingSetting:
                ClosingResponse:
                  MessageGroupsList:
                    - Message:
                        PlainTextMessage:
                          Value: "Perfect! I have noted down your request for a meeting on {AppointmentDate} at {AppointmentTime}. Jericho will review this and get back to you shortly."
                NextStep:
                  DialogAction:
                    Type: "CloseIntent"
